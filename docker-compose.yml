# =============================================================================
# Docker Compose Configuration for Moxfield Analyzer
# =============================================================================
services:
  moxfield-analyzer-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"

    # Environment variables - loads from .env file
    environment:
      # Server
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PORT=3000

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # External APIs - Moxfield
      - MOXFIELD_API_BASE_URL=${MOXFIELD_API_BASE_URL:-https://api2.moxfield.com}
      - MOXFIELD_REFERER=${MOXFIELD_REFERER:-https://moxfield.com/}
      - MOXFIELD_ORIGIN=${MOXFIELD_ORIGIN:-https://moxfield.com}
      - MOXFIELD_TIMEOUT_MS=${MOXFIELD_TIMEOUT_MS:-30000}

      # External APIs - Scryfall
      - SCRYFALL_API_BASE_URL=${SCRYFALL_API_BASE_URL:-https://api.scryfall.com}
      - SCRYFALL_IMAGE_BASE_URL=${SCRYFALL_IMAGE_BASE_URL:-https://cards.scryfall.io/normal}
      - SCRYFALL_TIMEOUT_SECONDS=${SCRYFALL_TIMEOUT_SECONDS:-5}
      - SCRYFALL_MAX_RETRIES=${SCRYFALL_MAX_RETRIES:-2}

      # External APIs - Commander Spellbook
      - COMMANDER_SPELLBOOK_API_BASE_URL=${COMMANDER_SPELLBOOK_API_BASE_URL:-https://backend.commanderspellbook.com}
      - COMMANDER_SPELLBOOK_WEB_BASE_URL=${COMMANDER_SPELLBOOK_WEB_BASE_URL:-https://commanderspellbook.com}
      - COMMANDER_SPELLBOOK_TIMEOUT_SECONDS=${COMMANDER_SPELLBOOK_TIMEOUT_SECONDS:-30}

      # Cache
      - CACHE_DECK_TTL=${CACHE_DECK_TTL:-300}
      - CACHE_ORACLE_TTL=${CACHE_ORACLE_TTL:-3600}

      # Browser Pool
      - BROWSER_POOL_MAX_USES=${BROWSER_POOL_MAX_USES:-50}

      # HTTP Client
      - HTTP_CLIENT_TIMEOUT=${HTTP_CLIENT_TIMEOUT:-30}
      - HTTP_CLIENT_MAX_KEEPALIVE=${HTTP_CLIENT_MAX_KEEPALIVE:-20}
      - HTTP_CLIENT_MAX_CONNECTIONS=${HTTP_CLIENT_MAX_CONNECTIONS:-100}

      # CORS
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-false}
      - CORS_ALLOW_METHODS=${CORS_ALLOW_METHODS:-GET,POST,OPTIONS}
      - CORS_ALLOW_HEADERS=${CORS_ALLOW_HEADERS:-Content-Type,Authorization}
      - CORS_MAX_AGE=${CORS_MAX_AGE:-86400}

    # Restart policy
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
